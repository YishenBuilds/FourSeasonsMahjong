<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Four Seasons Mahjong</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #243029;
      --muted: #647267;
      --paper: #fffaf0;
      --line: #dacfb9;
      --accent: #315f47;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      background: #f4efe4;
      line-height: 1.6;
    }

    main {
      width: min(720px, calc(100% - 40px));
      margin: 48px auto;
      padding: 32px;
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: 16px;
      box-shadow: 0 12px 30px rgba(49, 44, 36, 0.08);
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(30px, 7vw, 44px);
      line-height: 1.08;
      letter-spacing: 0;
    }

    p {
      margin: 0 0 18px;
      color: var(--muted);
    }

    a {
      color: var(--accent);
      font-weight: 700;
      text-decoration-thickness: 1px;
      text-underline-offset: 3px;
    }

    ul {
      padding-left: 20px;
    }
  </style>
</head>
<body>
  <main>
    <h1>Four Seasons Mahjong</h1>
    <p>Public support pages for Four Seasons Mahjong.</p>
    <ul>
      <li><a href="./privacy/four-seasons-mahjong/">Privacy Policy</a></li>
      <li><a href="./support/four-seasons-mahjong/">Support</a></li>
    </ul>
    <p>Developer: YishenBuilds<br>Contact: <a href="mailto:3649594286@qq.com">3649594286@qq.com</a></p>
  </main>
</body>
</html>
